
name: Render PPTX

# Triggered on manual run only
on:
  workflow_dispatch:

jobs:

  yaml-check:
    name: Load user automation choices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

        # Use the yaml-env-action action.
      - name: Load environment from YAML
        uses: doughepi/yaml-env-action@v1.0.0
        with:
            files: config_automation.yml # Pass a space-separated list of configuration files. Rightmost files take precedence.
    outputs:
      rendering_docker_image: "${{ env.RENDERING_DOCKER_IMAGE }}"

########################## Site ##############################

  render-main:
    name: Render Rmd to pptx
    needs: yaml-check
    runs-on: ubuntu-latest
    container:
      image: ${{needs.yaml-check.outputs.rendering_docker_image}}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Give permission to access the repo
      - name: safelist repository
        run: |
          repo_name='${{ github.event.repository.name }}'
          git config --global --add safe.directory /__w/$repo_name/$repo_name
    
      # # Checks-out your repository with the token so your job can access it
      - name: checkout
        uses: actions/checkout@v4
        with:
          # get the full repo
          fetch-depth: 0
          # use github PAT
          token: ${{ secrets.GH_PAT }}
          
      # Set up git checkout
      - name: Set up git checkout
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git fetch --all
          git checkout main
          git merge -s recursive --strategy-option=theirs origin/main --allow-unrelated-histories
        shell: bash

      # Render all module files
      - name: Render pptxs of modules
        id: pptxs
        run: |
          Rscript --vanilla "scripts/render_pptx.R" --files "all" 
        
      - name: Delete intermediate files
        id: getfiles
        run: |
          rm lecture_files.csv

      # This checks on the steps before it and makes sure that they completed.
      # If the renders didn't complete we don't want to commit the file changes
      - name: Check on render steps
        if: steps.pptxs.outcome != 'success'
        run: |
          echo pptxs status ${{steps.pptxs.outcome}}
          exit 1
          
      # Commit the rendered files
      - name: Commit pptx
        run: |
          git status
          git add *.pptx --force
          git commit -m 'Render pptx files' || echo "No changes to commit"
          git status
          git pull --rebase --set-upstream origin main --allow-unrelated-histories --strategy-option=ours
          git push --force || echo "No changes to commit"
